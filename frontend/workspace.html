<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCode | Workspace</title>
    <link rel="stylesheet" href="css/style_home.css">
    <link rel="stylesheet" href="css/style_workspace.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"/>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
</head>
<body class="workspace-body">

<header class="top-nav">
    <div class="logo">
        <span class="logo-prefix">~$</span><span class="logo-text">Edu<span class="logo-accent">Code</span></span>
    </div>
    <div class="workspace-actions">
        <div id="debug-status" class="debug-status" style="display:none;"></div>
        <button class="tool-btn" id="btn-add-file" title="Upload File">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Add File
        </button>
        <div class="divider"></div>
        <button class="tool-btn debug-btn" id="btn-debug" title="Check Syntax">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Debug
        </button>
        <button class="tool-btn run-btn" id="btn-run" title="Run & Compile">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Run & Compile
        </button>
    </div>
</header>

<div class="dashboard-layout workspace-layout">
    <aside class="sidebar glass-panel">
        <div class="nav-top">
            <a href="home.html" class="nav-item" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="explorer.html" class="nav-item" title="File Explorer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            </a>
            <a href="terminal.html" class="nav-item active" title="Terminal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            </a>
            <a href="settings.html" class="nav-item" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </a>
        </div>
        <div class="nav-bottom">
            <a href="profile.html" class="nav-avatar" title="Profile">
                <span class="nav-avatar-text">?</span>
            </a>
        </div>
    </aside>

    <main class="workspace-main">
        <div class="ide-panel editor-wrapper">
            <div class="panel-tab tab-top" id="editor-tab-label">editor</div>
            <div id="monaco-editor" class="editor-container"></div>
        </div>
        <div class="right-column">
            <div class="ide-panel output-wrapper">
                <div class="panel-tab tab-top">output</div>
                <div class="output-container" id="output-content" tabindex="0"></div>
            </div>
            <div class="ide-panel terminal-wrapper">
                <div class="terminal-header">
                    <span class="status-dot"></span> Ubuntu 22.04 | <span class="term-email" id="term-user-name">...</span>
                </div>
                <div id="terminal-container" class="terminal-container"></div>
                <div class="panel-tab tab-bottom">cli linux</div>
            </div>
        </div>
    </main>
</div>

<!-- MODAL UPLOAD FILE -->
<div class="modal-overlay" id="modal-file-upload">
    <div class="modal-content">
        <h2 class="modal-title">Upload File to Project</h2>
        <p style="color:var(--text-muted);text-align:center;margin:-12px 0 20px;font-size:13px;">
            File will be saved to your container workspace.
        </p>
        <div class="drop-zone" id="drop-zone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <span class="drop-text">Drag & drop a file here, or click to browse</span>
            <input type="file" id="file-input" hidden>
        </div>
        <div id="upload-status" style="font-size:13px;text-align:center;min-height:20px;margin-top:8px;"></div>
        <div class="modal-actions" style="margin-top:16px;">
            <button type="button" class="btn-outline" id="btn-cancel-upload">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
<script src="js/session.js"></script>
<script src="js/script_workspace.js"></script>
</body>
</html>
