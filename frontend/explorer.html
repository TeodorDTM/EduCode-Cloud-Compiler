<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCode | File Explorer</title>
    <link rel="stylesheet" href="css/style_home.css">
    <link rel="stylesheet" href="css/style_explorer.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>

    <header class="top-nav">
        <div class="logo">
            <span class="logo-prefix">~$</span><span class="logo-text">Edu<span class="logo-accent">Code</span></span>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar glass-panel">
            <div class="nav-top">
                <a href="home.html" class="nav-item" title="Home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </a>
                <a href="explorer.html" class="nav-item active" title="File Explorer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                </a>
                <a href="#" class="nav-item" title="Terminal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                </a>
            </div>
            <div class="nav-bottom">
                <div class="user-status online" title="Profile"></div>
            </div>
        </aside>

        <main class="main-content explorer-main">
            
            <div class="explorer-header">
                <h1 class="greeting" style="margin: 0; font-size: 28px;">File Explorer</h1>
                <div class="explorer-actions">
                    <button class="btn-outline" id="btn-refresh" title="Refresh">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    </button>
                    <button class="btn-primary" id="btn-new-folder">+ New Folder</button>
                </div>
            </div>

            <div class="breadcrumbs-container">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="folder-icon"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <div id="breadcrumbs" class="breadcrumbs">
                    <span class="crumb" data-path="/home/student/workspace">workspace</span>
                </div>
            </div>

            <div class="file-grid" id="file-grid">
                <div class="loading-text">Loading files...</div>
            </div>

        </main>
    </div>

    <div id="context-menu" class="context-menu">
        <div class="context-item" id="ctx-rename">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Rename
        </div>
        <div class="context-divider"></div>
        <div class="context-item danger" id="ctx-delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete
        </div>
    </div>

    <script src="js/script_explorer.js"></script>
</body>
</html>
