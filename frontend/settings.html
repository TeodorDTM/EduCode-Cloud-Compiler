<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCode | Settings</title>
    <link rel="stylesheet" href="css/style_home.css">
    <link rel="stylesheet" href="css/style_settings.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-glow"></div>

<header class="top-nav">
    <div class="logo">
        <span class="logo-prefix">~$</span><span class="logo-text">Edu<span class="logo-accent">Code</span></span>
    </div>
    <div class="topnav-right">
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</header>

<div class="dashboard-layout">
    <aside class="sidebar glass-panel">
        <div class="nav-top">
            <a href="home.html" class="nav-item" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="explorer.html" class="nav-item" title="File Explorer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            </a>
            <a href="terminal.html" class="nav-item" title="Terminal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            </a>
            <a href="settings.html" class="nav-item active" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </a>
        </div>
        <div class="nav-bottom">
            <a href="profile.html" class="nav-avatar" title="Profile">
                <span class="nav-avatar-text">?</span>
            </a>
        </div>
    </aside>

    <main class="main-content settings-main">
        <h1 class="greeting" style="margin-bottom:32px;">Settings</h1>

        <!-- EDITOR SETTINGS -->
        <div class="settings-section glass-section">
            <div class="section-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="section-icon"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                <h2>Code Editor</h2>
            </div>

            <div class="settings-grid">

                <!-- Font Size -->
                <div class="setting-item">
                    <div class="setting-label">
                        <span>Font Size</span>
                        <span class="setting-value-display" id="font-size-display">15px</span>
                    </div>
                    <input type="range" id="font-size" min="12" max="22" value="15" class="range-slider">
                    <div class="range-labels"><span>12px</span><span>22px</span></div>
                </div>

                <!-- Editor Theme -->
                <div class="setting-item">
                    <div class="setting-label"><span>Editor Theme</span></div>
                    <div class="btn-group" id="theme-group">
                        <button class="btn-option active" data-value="vs-dark">Dark</button>
                        <button class="btn-option" data-value="vs">Light</button>
                        <button class="btn-option" data-value="hc-black">High Contrast</button>
                    </div>
                </div>

                <!-- Tab Size -->
                <div class="setting-item">
                    <div class="setting-label"><span>Tab Size</span></div>
                    <div class="btn-group" id="tab-group">
                        <button class="btn-option" data-value="2">2 spaces</button>
                        <button class="btn-option active" data-value="4">4 spaces</button>
                    </div>
                </div>

                <!-- Word Wrap -->
                <div class="setting-item">
                    <div class="setting-label"><span>Word Wrap</span></div>
                    <div class="btn-group" id="wrap-group">
                        <button class="btn-option active" data-value="on">On</button>
                        <button class="btn-option" data-value="off">Off</button>
                    </div>
                </div>

                <!-- Autosave Interval -->
                <div class="setting-item">
                    <div class="setting-label"><span>Autosave Interval</span></div>
                    <div class="btn-group" id="autosave-group">
                        <button class="btn-option" data-value="3000">3s</button>
                        <button class="btn-option active" data-value="5000">5s</button>
                        <button class="btn-option" data-value="10000">10s</button>
                        <button class="btn-option" data-value="30000">30s</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ACCOUNT SETTINGS -->
        <div class="settings-section glass-section">
            <div class="section-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="section-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <h2>Account</h2>
            </div>
            <div class="account-links">
                <a href="profile.html" class="account-link-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Edit Profile
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" class="chevron"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
                <a href="profile.html#password" class="account-link-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Change Password
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" class="chevron"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
                <div class="account-link-item danger-link" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </div>
            </div>
        </div>

        <!-- SAVE BUTTON -->
        <div class="save-bar">
            <div id="save-status" class="save-status"></div>
            <button class="btn-save-settings" id="btn-save-settings">Save Settings</button>
        </div>

    </main>
</div>

<script src="js/session.js"></script>
<script src="js/script_settings.js"></script>
</body>
</html>
