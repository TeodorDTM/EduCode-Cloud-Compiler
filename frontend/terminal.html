<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCode | Terminal</title>
    <link rel="stylesheet" href="css/style_home.css">
    <link rel="stylesheet" href="css/style_terminal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"/>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
</head>
<body class="terminal-body">
<div class="bg-glow"></div>

<header class="top-nav">
    <div class="logo">
        <span class="logo-prefix">~$</span>
        <span class="logo-text">Edu<span class="logo-accent">Code</span></span>
    </div>
    <div class="topnav-right">
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</header>

<div class="dashboard-layout">
    <aside class="sidebar glass-panel">
        <div class="nav-top">
            <a href="home.html" class="nav-item" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="explorer.html" class="nav-item" title="File Explorer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            </a>
            <a href="terminal.html" class="nav-item active" title="Terminal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            </a>
            <a href="settings.html" class="nav-item" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </a>
        </div>
        <div class="nav-bottom">
            <a href="profile.html" class="nav-avatar" title="Profile">
                <span class="nav-avatar-text">?</span>
            </a>
        </div>
    </aside>

    <main class="main-content terminal-main">

        <!-- Header row: title + system badge -->
        <div class="terminal-header-top">
            <h1 class="greeting" style="margin:0;font-size:26px;">Virtual Terminal</h1>
            <div class="terminal-badge">
                <span class="status-dot"></span>
                <span class="badge-distro">Ubuntu 22.04 LTS</span>
                <span class="badge-sep">·</span>
                <span class="badge-user" id="badge-user">...</span>
            </div>
        </div>

        <!-- Terminal window -->
        <div class="terminal-window">

            <!-- Tab bar -->
            <div class="term-tab-bar">
                <div class="term-tabs-scroll">
                    <div class="term-tabs" id="term-tabs"></div>
                </div>
                <button class="term-new-tab-btn" id="btn-new-tab" title="New Terminal (Ctrl+Shift+T)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>

            <!-- Terminal panels -->
            <div class="term-panels-wrap" id="term-panels-wrap"></div>

        </div>
    </main>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="js/session.js"></script>
<script src="js/script_terminal.js"></script>
</body>
</html>
